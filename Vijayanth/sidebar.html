<script>
    function initSidebar() {
        const params = new URLSearchParams(window.location.search);
        let storedUser = {};
        try { storedUser = JSON.parse(sessionStorage.getItem('vs_user') || '{}'); } catch (e) {}
        const assignedPlant = storedUser.role && storedUser.role !== 'admin' ? storedUser.plant_id : '';
        // Plant accounts cannot be switched with a URL. Admins may select either plant.
        const plant = assignedPlant
            || params.get('plant')
            || sessionStorage.getItem('vs_current_plant')
            || 'vijayanth';
        // Store in sessionStorage (tab-specific) NOT localStorage to keep tabs isolated
        sessionStorage.setItem('vs_current_plant', plant);
        const plantNames = {
            'vijayanth': 'Bojaraj Textiles Pvt Ltd',
            'bojaraj': 'Bojaraj Textiles Pvt Ltd',
            'krishna': 'Krishna poultry farm'
        };

        const plantName = plantNames[plant] || plant.replace(/[-_]/g, ' ');
        const el = document.getElementById('sidebarPlantName');
        if (el) el.textContent = plantName;

        const adminBack = document.getElementById('adminBackDashboard');
        try {
            if (adminBack && storedUser.role === 'admin') {
                adminBack.classList.remove('hidden');
                adminBack.classList.add('flex');
            }
        } catch (e) {}

        const navLinks = document.querySelectorAll('#sidebarNav a');
        const current = window.location.pathname.split('/').pop() || 'overview.php';

        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href === 'logout.php') return; 
            if (!href.includes('?plant=')) {
                link.setAttribute('href', `${href}?plant=${encodeURIComponent(plant)}`);
            }
            if (href === current || href.replace('.php','.html') === current) {
                link.classList.add('bg-emerald-100', 'text-emerald-700', 'font-semibold', 'border-l-4', 'border-emerald-600');
            }
        });

        // Collapse/Expand functionality
        const sidebar = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapseSidebarBtn');
        const logoWrapper = document.getElementById('logoWrapper');
        const sidebarNav = document.getElementById('sidebarNav');
        const mainEl = document.querySelector('main');

        if (mainEl) {
            mainEl.classList.add('transition-all', 'duration-300', 'ease-in-out');
        }

        let isCollapsed = localStorage.getItem('sidebar_collapsed') === 'true';

        function applyCollapseState(collapsed) {
            if (collapsed) {
                sidebar.classList.remove('w-64');
                sidebar.classList.add('w-16');
                if (logoWrapper) logoWrapper.classList.add('hidden');
                
                if (collapseBtn) {
                    collapseBtn.innerHTML = '<i class="fa-solid fa-chevron-right text-[10px]"></i>';
                    collapseBtn.className = "flex items-center justify-center w-10 h-10 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-600 shadow-md hover:bg-emerald-100 transition-all mx-auto mt-2";
                }

                document.querySelectorAll('.sidebar-text').forEach(el => el.classList.add('hidden'));
                document.querySelectorAll('.sidebar-content').forEach(el => el.classList.add('justify-center'));
                
                if (sidebarNav) {
                    sidebarNav.classList.remove('p-4');
                    sidebarNav.classList.add('px-2', 'py-4');
                }

                document.querySelectorAll('#sidebarNav .nav-item').forEach(item => {
                    item.classList.remove('gap-3', 'px-3');
                    item.classList.add('justify-center', 'px-0');
                });

                if (mainEl) {
                    mainEl.classList.remove('md:ml-64', 'ml-64', 'md:ml-16', 'ml-16');
                    mainEl.classList.add('md:ml-16');
                }
            } else {
                sidebar.classList.remove('w-16');
                sidebar.classList.add('w-64');
                if (logoWrapper) logoWrapper.classList.remove('hidden');
                
                if (collapseBtn) {
                    collapseBtn.innerHTML = '<i class="fa-solid fa-chevron-left text-[10px]"></i>';
                    collapseBtn.className = "hidden md:flex absolute -right-3 top-6 items-center justify-center w-6 h-6 rounded-full bg-white border border-gray-200 text-gray-400 hover:text-emerald-600 hover:border-emerald-300 shadow-sm transition-all z-50";
                }

                document.querySelectorAll('.sidebar-text').forEach(el => el.classList.remove('hidden'));
                document.querySelectorAll('.sidebar-content').forEach(el => el.classList.remove('justify-center'));
                
                if (sidebarNav) {
                    sidebarNav.classList.remove('px-2', 'py-4');
                    sidebarNav.classList.add('p-4');
                }

                document.querySelectorAll('#sidebarNav .nav-item').forEach(item => {
                    item.classList.add('gap-3', 'px-3');
                    item.classList.remove('justify-center', 'px-0');
                });

                if (mainEl) {
                    mainEl.classList.remove('md:ml-16', 'ml-16', 'md:ml-64', 'ml-64');
                    mainEl.classList.add('md:ml-64');
                }
            }
        }

        applyCollapseState(isCollapsed);

        collapseBtn?.addEventListener('click', () => {
            isCollapsed = !isCollapsed;
            localStorage.setItem('sidebar_collapsed', isCollapsed);
            applyCollapseState(isCollapsed);
        });
    }

    if (!window.sidebarInitialized) {
        window.sidebarInitialized = true;
        initSidebar();
    }
</script>
