<script>
    function initSidebar() {
        const params = new URLSearchParams(window.location.search);
        let plant = params.get('plant');
        let token = params.get('token') || sessionStorage.getItem('vs_token') || '';
        // If no URL param, try to get user's plant from sessionStorage
        if (!plant) {
            try {
                const userStr = sessionStorage.getItem('vs_user');
                if (userStr) {
                    const user = JSON.parse(userStr);
                    if (user.plant_id) plant = user.plant_id;
                }
            } catch(e) {}
        }
        // Final fallback
        if (!plant) plant = 'vinoba-velliyanai';
        const plantNames = {
            'vinoba-velliyanai': 'Vinoba Velliyanai',
            'makkalpower': 'Makkal Power',
            'anushyam': 'Anushyam Plant'
        };

        const plantName = plantNames[plant] || plant.replace(/[-_]/g, ' ');
        const el = document.getElementById('sidebarPlantName');
        if (el) el.textContent = plantName;

        const navLinks = document.querySelectorAll('#sidebarNav a');
        const current = window.location.pathname.split('/').pop() || 'home.php';
        console.log('SIDEBAR: current page =', current, '| plant =', plant);

        navLinks.forEach(link => {
            let href = link.getAttribute('href');
            if (href === 'logout.php') return; // skip logout link
            if (!href.includes('?plant=')) {
                link.setAttribute('href', `${href}?plant=${encodeURIComponent(plant)}&token=${encodeURIComponent(token)}`);
            } else if (!href.includes('token=')) {
                link.setAttribute('href', `${href}&token=${encodeURIComponent(token)}`);
            }
            // Use data-page for reliable comparison (never modified)
            const page = link.getAttribute('data-page');
            const isActive = page === current || page.replace('.php','.html') === current;
            if (isActive) {
                link.classList.add('!bg-slate-100', '!text-emerald-700', '!border-emerald-500', 'shadow-lg', 'shadow-slate-200');
                const icon = link.querySelector('i');
                if (icon) { icon.classList.add('!text-emerald-600'); }
            }
        });

    }

    if (!window.sidebarInitialized) {
        window.sidebarInitialized = true;
        initSidebar();
    }
</script>
